# MemoLog Configuration
# You can delete this file to use built-in defaults.

[data]
log_path = "logs"

[keybindings.composer]
submit = ["shift+enter"]
newline = ["enter"]
cancel = ["esc"]

[capture]
# Auto-add @sched(...)/@time(...) from natural language in Quick Capture and new entries.
nl_parse = true
# Inline daily-note template inserted once when a new day's log file is first created.
# Empty = no template. Placeholders: {{date}}, {{weekday}}, {{date_long}}, {{date_short}},
# {{month}}, {{year}}, {{week}}, {{iso_week}}, {{doy}}.
# Example: daily_template = "# {{date}} ({{weekday}})\n"
daily_template = ""

[editor]
# Max suggestions shown in the [[wikilink]] autocomplete popup.
link_complete_max_items = 12

[gemini]
enabled = false
api_key = ""
model = "gemini-3-flash-preview"
extraction_model = "gemma-3-27b-it"
answer_model = "gemini-3-flash-preview"
extraction_attempts = 3
extraction_temperature = 0.4
answer_max_tokens = 2048
max_keywords = 6
max_results = 8
max_entry_chars = 1200
timeout_seconds = 20
